###
# Helix Editor config
###

# :config-open
# Linux and Mac: ~/.config/helix/config.toml
# Windows: %AppData%\helix\config.toml

# Theme list: https://helix-editor.vercel.app/reference/list-of-themes
theme = "dark_plus"

[editor]
line-number = "relative"
# mouse = false

[editor.cursor-shape]
insert = "bar"
# normal = "block"
# select = "underline"

[editor.file-picker]
# hidden = false
